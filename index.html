<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Ultimate Experience | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">يتم الآن تجهيز المحركات...</p>
    </div>

    <header id="navbar">
        <div class="nav-container">
            <div class="logo">BMW <span>Ultimate</span></div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#models">Models</a></li>
                    <li><a href="#compare">Comparison</a></li>
                    <li><a href="#finance">Financing</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div>
            <h1>The future of leadership starts here</h1>
            <p style="font-size: 1.2rem; margin-bottom: 30px;">Explore all BMW categories for the 2026 models</p>
            <button class="btn-main" onclick="window.scrollTo(0, 800)">Start the journey</button>
        </div>
    </section>

    <section id="models" class="section-padding container">
        <h2 class="section-title">Base models</h2>
        <div class="car-grid" id="carGrid">
            </div>
    </section>

    <section id="compare" class="section-padding compare-section">
        <div class="container">
            <h2 class="section-title">Compare Specifications</h2>
            <div class="compare-flex">
                <div class="compare-box">
                    <select id="select1" onchange="compareCars()"></select>
                    <div id="stats1"></div>
                </div>
                <div style="font-size: 2rem; align-self: center;">VS</div>
                <div class="compare-box">
                    <select id="select2" onchange="compareCars()"></select>
                    <div id="stats2"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="finance" class="section-padding container">
        <h2 class="section-title">حاسبة الأقساط الشهرية</h2>
        <div class="finance-box">
            <div class="input-group">
                <label>سعر السيارة ($)</label>
                <input type="number" id="priceInput" value="50000" oninput="calculateFinance()">
            </div>
            <div class="input-group">
                <label>الدفعة الأولى ($)</label>
                <input type="number" id="downPaymentInput" value="10000" oninput="calculateFinance()">
            </div>
            <div class="input-group">
                <label>مدة التمويل (سنوات)</label>
                <input type="number" id="yearsInput" value="5" oninput="calculateFinance()">
            </div>
            <div class="result-display">
                <p>القسط الشهري التقريبي</p>
                <h3 id="monthlyResult">$0.00</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>© Py AHMED   Mostafa Aziz</p>
    </footer>

    <script src="script1.js"></script>
</body>
</html>
